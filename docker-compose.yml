version: '3.8'

services:
  # The AI Insights Engine — runs autonomous analysis cycles
  agent:
    build: .
    restart: always
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: python run_agent.py

  # The Telegram Bot — interactive insights interface
  telegram:
    build: .
    restart: always
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: python telegram_bot.py
    depends_on:
      - agent

volumes:
  data:
  models:
