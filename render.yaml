services:
  - type: worker
    name: algo-bot
    env: docker
    dockerfilePath: Dockerfile
    region: oregon
    plan: starter  # Workers need at least 'starter' ($7/mo). No free tier for background workers.
    envVars:
      # ── Alpaca ──────────────────────────────────────
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_API_SECRET
        sync: false
      - key: ALPACA_BASE_URL
        value: https://paper-api.alpaca.markets

      # ── Data Providers ───────────────────────────────
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false

      # ── Agent Config ─────────────────────────────────
      - key: AGENT_MODE
        value: paper
      - key: AGENT_SYMBOLS
        value: BTC-USD,EURUSD=X,GC=F
      - key: AGENT_INTERVAL_MINUTES
        value: "60"
      - key: AGENT_INITIAL_CAPITAL
        value: "10000"

      # ── Sentiment / AI ───────────────────────────────
      - key: SENTIMENT_ENGINE
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL_8B
        value: llama-3.1-8b-instant
      - key: GROQ_MODEL_70B
        value: llama-3.3-70b-versatile

      # ── Risk Thresholds ───────────────────────────────
      - key: REQUIRED_VOTE_SCORE
        value: "0.55"
      - key: MAX_DRAWDOWN_PCT
        value: "15"
      - key: RISK_PER_TRADE_PCT
        value: "1"
      - key: ATR_SL_MULT
        value: "2.0"
      - key: ATR_TP_MULT
        value: "10.0"

      # ── Retraining ────────────────────────────────────
      - key: RETRAIN_WIN_RATE_THRESHOLD
        value: "0.45"
      - key: RETRAIN_MAX_AGE_DAYS
        value: "30"
      - key: RETRAIN_BOOTSTRAP
        value: "True"

      # ── Telegram ─────────────────────────────────────
      - key: TELEGRAM_ENABLED
        value: "True"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

    disk:
      name: algo-data
      mountPath: /app/data
      sizeGB: 1
